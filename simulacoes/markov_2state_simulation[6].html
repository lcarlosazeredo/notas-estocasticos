<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulação: Cadeia de Markov Interativa</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .full { grid-column: 1 / -1; }
        canvas { border: 1px solid #ddd; background: #fff; width: 100%; border-radius: 8px; }
        .controls { background: #e9ecef; padding: 20px; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        h2 { font-size: 1.1em; color: #2c3e50; border-left: 4px solid #3498db; padding-left: 10px; margin-bottom: 10px; }
        .stat-box { background: #f1f8ff; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.85em; margin-top: 5px; border: 1px solid #d1e9ff; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        #runB { background: #2ecc71; color: white; }
        #stepB { background: #3498db; color: white; }
        #resetB { background: #95a5a6; color: white; }
        .control-item { display: flex; flex-direction: column; gap: 5px; font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>Cadeia de Markov: Simulação, &mu;<sub>t</sub> e Convergência</h1>
    
    <div class="controls">
        <div class="control-item">p (0→1): <input type="range" id="pIn" min="0" max="1" step="0.05" value="0.3"> <span id="pL">0.3</span></div>
        <div class="control-item">q (1→0): <input type="range" id="qIn" min="0" max="1" step="0.05" value="0.4"> <span id="qL">0.4</span></div>
        <div class="control-item">Velocidade: <input type="range" id="speedIn" min="1" max="100" value="70"></div>
        <div class="control-item">Início (X0): <select id="x0S"><option value="0">Estado 0</option><option value="1">Estado 1</option></select></div>
        <button id="runB">Auto / Pausa</button>
        <button id="stepB">Passo a passo</button>
        <button id="resetB">Reset</button>
    </div>

    <div class="grid">
        <div class="box">
            <h2>1. Diagrama de Estados e Salto (U<sub>t</sub>)</h2>
            <canvas id="c1" width="500" height="250"></canvas>
            <div class="stat-box" id="info1">Estado: - | U_t: -</div>
        </div>
        <div class="box">
            <h2>2. Evolução de &mu;<sub>t</sub>(0) (Teórico)</h2>
            <canvas id="c2" width="500" height="250"></canvas>
            <div class="stat-box" id="info2">&mu;<sub>t</sub>(0) atual: -</div>
        </div>
        <div class="box full">
            <h2>3. Convergência da Frequência para &pi;(0)</h2>
            <canvas id="c3" width="1000" height="250"></canvas>
            <div class="stat-box" id="info3">T: 0 | Freq. Observada de 0: - | &pi;(0) Teórico: -</div>
        </div>
    </div>
</div>

<script>
const pIn = document.getElementById('pIn'), qIn = document.getElementById('qIn'), pL = document.getElementById('pL'), qL = document.getElementById('qL');
const speedIn = document.getElementById('speedIn'), x0S = document.getElementById('x0S');
const runB = document.getElementById('runB'), stepB = document.getElementById('stepB'), resetB = document.getElementById('resetB');
const ctx1 = document.getElementById('c1').getContext('2d'), ctx2 = document.getElementById('c2').getContext('2d'), ctx3 = document.getElementById('c3').getContext('2d');

let p, q, t, state, lastU, running, history, mu0Hist;

function reset() {
    p = parseFloat(pIn.value); q = parseFloat(qIn.value);
    t = 0; state = parseInt(x0S.value); lastU = 0.5;
    history = [state]; mu0Hist = [state === 0 ? 1 : 0];
    running = false; runB.innerText = "Auto / Pausa"; draw();
}

function step() {
    lastU = Math.random();
    // Algoritmo F(x,u) da Aula 3
    if(state === 0) { if(lastU <= p) state = 1; } 
    else { if(lastU <= q) state = 0; }
    
    // mu_t teórico: mu_t(0) = mu_{t-1}(0)(1-p) + mu_{t-1}(1)q
    let lastMu0 = mu0Hist[mu0Hist.length - 1];
    let nextMu0 = lastMu0 * (1-p) + (1-lastMu0) * q;
    
    t++; history.push(state); mu0Hist.push(nextMu0);
    draw();
}

function draw() {
    const pi0 = q / (p + q);
    const pad = 40, w1 = 420, h1 = 170, w3 = 920;

    // --- 1. DIAGRAMA E BARRA ---
    ctx1.clearRect(0,0,500,250);
    const drawNode = (x, y, id, active) => {
        ctx1.beginPath(); ctx1.arc(x, y, 25, 0, 7);
        ctx1.fillStyle = active ? '#f1c40f' : '#ecf0f1';
        ctx1.fill(); ctx1.stroke();
        ctx1.fillStyle = '#000'; ctx1.font = "bold 14px Arial"; ctx1.fillText("E" + id, x-8, y+5);
    };
    drawNode(120, 70, 0, state === 0); drawNode(380, 70, 1, state === 1);
    ctx1.beginPath(); ctx1.moveTo(145, 60); ctx1.quadraticCurveTo(250, 20, 355, 60); ctx1.stroke();
    ctx1.fillText("p=" + p, 240, 35);
    ctx1.beginPath(); ctx1.moveTo(355, 80); ctx1.quadraticCurveTo(250, 120, 145, 80); ctx1.stroke();
    ctx1.fillText("q=" + q, 240, 115);
    // Barra de Probabilidade
    ctx1.fillStyle = '#eee'; ctx1.fillRect(50, 160, 400, 30); ctx1.strokeRect(50, 160, 400, 30);
    let lim = (history[history.length-1] === 0) ? p : q;
    ctx1.fillStyle = '#e74c3c'; ctx1.fillRect(50, 160, lim*400, 30);
    ctx1.fillStyle = '#3498db'; ctx1.fillRect(50 + lim*400, 160, (1-lim)*400, 30);
    let ux = 50 + lastU * 400;
    ctx1.beginPath(); ctx1.moveTo(ux, 155); ctx1.lineTo(ux, 195); ctx1.strokeStyle = '#000'; ctx1.lineWidth = 2; ctx1.stroke(); ctx1.lineWidth = 1;
    document.getElementById('info1').innerText = `Estado Atual: ${state} | U_t: ${lastU.toFixed(3)} | Limite de Transição: ${lim}`;

    // --- 2. GRAFICO MU_T (EIXO FIXO 0-1) ---
    ctx2.clearRect(0,0,500,250);
    ctx2.beginPath(); ctx2.moveTo(pad, pad); ctx2.lineTo(pad, pad+h1); ctx2.lineTo(pad+w1, pad+h1); ctx2.stroke();
    ctx2.fillText("1.0", 15, pad+5); ctx2.fillText("0.0", 15, pad+h1+5);
    ctx2.strokeStyle = '#3498db'; ctx2.lineWidth = 2; ctx2.beginPath();
    mu0Hist.forEach((m, i) => {
        let x = pad + (i/Math.max(t, 100))*w1, y = pad + h1 - m*h1;
        if(i===0) ctx2.moveTo(x,y); else ctx2.lineTo(x,y);
    });
    ctx2.stroke(); ctx2.lineWidth = 1;
    ctx2.setLineDash([5,5]); ctx2.strokeStyle = '#27ae60'; ctx2.beginPath();
    let py = pad + h1 - pi0*h1; ctx2.moveTo(pad, py); ctx2.lineTo(pad+w1, py); ctx2.stroke(); ctx2.setLineDash([]);
    document.getElementById('info2').innerText = `μ_t(0) Teórico: ${mu0Hist[mu0Hist.length-1].toFixed(4)}`;

    // --- 3. CONVERGENCIA (EIXO FIXO 0-1) ---
    ctx3.clearRect(0,0,1000,250);
    ctx3.beginPath(); ctx3.moveTo(pad, pad); ctx3.lineTo(pad, pad+h1); ctx3.lineTo(pad+w3, pad+h1); ctx3.stroke();
    ctx3.fillText("1.0", 15, pad+5); ctx3.fillText("0.0", 15, pad+h1+5);
    let c0 = 0; ctx3.strokeStyle = '#e67e22'; ctx3.lineWidth = 2; ctx3.beginPath();
    history.forEach((s, i) => {
        if(s===0) c0++;
        let x = pad + (i/history.length)*w3, y = pad + h1 - (c0/(i+1))*h1;
        if(i===0) ctx3.moveTo(x,y); else ctx3.lineTo(x,y);
    });
    ctx3.stroke(); ctx3.lineWidth = 1;
    ctx3.setLineDash([5,5]); ctx3.strokeStyle = '#27ae60'; ctx3.beginPath();
    let py3 = pad + h1 - pi0*h1; ctx3.moveTo(pad, py3); ctx3.lineTo(pad+w3, py3); ctx3.stroke(); ctx3.setLineDash([]);
    document.getElementById('info3').innerText = `T: ${t} | Freq. Observada de 0: ${(c0/(t||1)).toFixed(3)} | π(0) Teórico: ${pi0.toFixed(3)}`;
}

pIn.oninput = qIn.oninput = () => { pL.innerText = pIn.value; qL.innerText = qIn.value; if(t===0) reset(); };
resetB.onclick = reset;
stepB.onclick = () => { running = false; step(); };
runB.onclick = () => { running = !running; if(running) loop(); };
function loop() { if(running) { step(); setTimeout(loop, 101 - speedIn.value); } }
reset();
</script>
</body>
</html>
