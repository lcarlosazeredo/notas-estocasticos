site_name: Processos Estocásticos - 26.1

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lcarlosazeredo/notas-estocasticos
      name: Repositório no GitHub

theme:
  name: material
  language: pt-BR
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.footer

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - admonition
  - pymdownx.details
  - toc:
      permalink: false
  - pymdownx.superfences # Mantemos apenas a base para o código Python/LaTeX funcionar

extra_javascript:
  - javascripts/mathjax.js
  #- https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

