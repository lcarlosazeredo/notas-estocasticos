site_name: Processos Estocásticos - 26.1

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lcarlosazeredo/notas-estocasticos
      name: Repositório no GitHub

theme:
  name: material
  language: pt-BR
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.footer

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - admonition
  - pymdownx.details
  - toc:
      permalink: false
  - pymdownx.superfences # Mantemos apenas a base para o código Python/LaTeX funcionar

extra_javascript:
  - javascripts/mathjax.js
  #- https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Início: index.md
  - Aulas:
      - Aula 01 | 09/03/2026: aulas/Aula01.md
      - Aula 02 | 11/03/2026: aulas/Aula02.md
      - Aula 03 | 13/03/2026: aulas/Aula03.md
      - Aula 04 | 16/03/2026: aulas/Aula04.md
      - Aula 05 | 18/03/2026: aulas/Aula05.md
      - Aula 06 | 20/03/2026: aulas/Aula06.md
      - Aula 07 | 23/03/2026: aulas/Aula07.md
      - Aula 08 | 25/03/2026: aulas/Aula08.md
      - Aula 09 | 27/03/2026: aulas/Aula09.md
  - Lista1: listas/lista1.md     